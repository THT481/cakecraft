<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên hệ — CakeCraft</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="src/css/theme.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23E0A93C'/><text x='50' y='72' font-size='62' text-anchor='middle' fill='%2314100C' font-family='Trebuchet MS'>C</text></svg>">
</head>
<body>

<section class="page-hero">
  <div class="container-c">
    <p class="breadcrumb-c reveal in"><a href="index.html">Trang chủ</a> / Liên hệ</p>
    <span class="eyebrow reveal in">Kết nối</span>
    <h1 class="title-c reveal in d1">Gửi lời nhắn <span class="it">cho chúng tôi</span></h1>
    <p class="subtitle-c mx-auto-c reveal in d2">Đặt bánh theo yêu cầu, hợp tác, hay chỉ muốn nói lời ngọt ngào — chúng tôi luôn lắng nghe.</p>
  </div>
</section>

<section class="section-c" style="padding-top:1rem">
  <div class="container-c">
    <div class="contact-grid">
      <div class="reveal">
        <div class="info-line"><div class="ico"><i class="bi bi-geo-alt"></i></div><div><h5>Địa chỉ</h5><p>611/14D Điện Biên Phủ, Bàn Cờ, Hồ Chí Minh</p></div></div>
        <div class="info-line"><div class="ico"><i class="bi bi-telephone"></i></div><div><h5>Điện thoại</h5><p>0962159860</p></div></div>
        <div class="info-line"><div class="ico"><i class="bi bi-envelope"></i></div><div><h5>Email</h5><p>hello@cakecraft.vn</p></div></div>
        <div class="info-line"><div class="ico"><i class="bi bi-clock"></i></div><div><h5>Giờ mở cửa</h5><p>8:00 – 22:00 tất cả các ngày</p></div></div>
      </div>
      <div class="contact-card reveal d2">
        <div class="field-c"><label>Họ tên</label><input class="input-c" id="cName" placeholder="Tên của bạn"></div>
        <div class="field-c"><label>Email</label><input class="input-c" id="cEmail" type="email" placeholder="ban@email.com"></div>
        <div class="field-c"><label>Lời nhắn</label><textarea class="textarea-c" id="cMsg" placeholder="Bạn muốn đặt bánh gì?"></textarea></div>
        <button class="btn-c btn-primary-c" id="contactSend" style="width:100%;justify-content:center"><i class="bi bi-send"></i> Gửi lời nhắn</button>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/SplitText.min.js"></script>
<script type="module" src="src/js/page.js"></script>
</body>
</html>
