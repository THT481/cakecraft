<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiết kế bánh — CakeCraft</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="src/css/theme.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23E0A93C'/><text x='50' y='72' font-size='62' text-anchor='middle' fill='%2314100C' font-family='Trebuchet MS'>C</text></svg>">
</head>
<body>

<section class="page-hero" style="padding-bottom:1.5rem">
  <div class="container-c">
    <span class="eyebrow reveal in">Cake Studio</span>
    <h1 class="title-c reveal in d1">Dựng <span class="it">chiếc bánh mơ ước</span></h1>
    <p class="subtitle-c mx-auto-c reveal in d2">Công cụ thiết kế từng bước giúp bạn tạo nên tâm điểm hoàn hảo cho dịp đặc biệt.</p>
  </div>
</section>

<div class="container-c" style="padding-bottom:4rem">
  <!-- STEPPER -->
  <div class="stepper" id="stepper"></div>

  <div class="studio-grid">
    <!-- LEFT: live preview -->
    <aside class="preview-col">
      <div class="preview-card">
        <div class="preview-head">
          <span class="preview-title">Xem trước</span>
          <span class="preview-shape-badge" id="previewShape">tròn</span>
        </div>
        <div class="cake-stage" id="cakeStage"></div>
        <div class="preview-meta">
          <div class="pm-item"><span class="pm-label">Chiều cao</span><span class="pm-val" id="previewHeight">4"</span></div>
          <div class="pm-item"><span class="pm-label">Khẩu phần</span><span class="pm-val" id="previewYield">40 phần</span></div>
        </div>
        <div class="preview-stats">
          <div class="ps-box"><span class="ps-label">Thành tiền</span><span class="ps-price" id="previewPrice">0đ</span></div>
          <div class="ps-box"><span class="ps-label">Số phần</span><span class="ps-num" id="previewServe">0</span></div>
        </div>
      </div>
    </aside>

    <!-- RIGHT: step content -->
    <div class="studio-main">
      <div id="stepPanel"></div>
      <div class="studio-nav">
        <button class="btn-c btn-ghost-c" id="prevBtn"><i class="bi bi-arrow-left"></i> Quay lại</button>
        <button class="btn-c btn-primary-c" id="nextBtn">Bước tiếp <i class="bi bi-arrow-right"></i></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/SplitText.min.js"></script>
<script type="module" src="src/js/design.js"></script>
</body>
</html>
